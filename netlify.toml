[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "http://knur.netlify.app/*"
  to = "https://wbs-editor.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://knur.netlify.app/*"
  to = "https://wbs-editor.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
